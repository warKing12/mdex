# 提取规则模板
# =================
#
# 格式说明：
#   字段名:          输出结果中的字段名
#   - "匹配模式":    用于匹配标题的关键词（支持多个）
#
# 匹配规则：
#   - 双向包含匹配：标题包含关键词 或 关键词包含标题
#   - 自动去除编号前缀（一、1.、（一）等）
#   - 自动去除末尾冒号（中文/英文）
#
# 示例：
#   模板: "项目背景"
#   能匹配: "## 一、项目背景说明："
#   能匹配: "## 项目背景"
#   能匹配: "## 背景说明"

# === 示例配置 ===
# 请根据你的实际需求修改以下内容

background:
  - "项目背景"
  - "背景说明"
  - "需求背景"

goal:
  - "建设目标"
  - "项目目标"
  - "目标"

scope:
  - "实施范围"
  - "项目范围"
  - "建设范围"